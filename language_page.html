
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Select Language</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="dark-theme">
  <header class="header">
    <img src="assets/logo.png" alt="Logo" class="logo" />
    <button onclick="window.location.href='movies_category.html'">Back</button>
  </header>

  <main style="padding:40px;">
    <h1>Select Language</h1>
    <div style="display:grid;grid-template-columns:repeat(auto-fit, minmax(180px,1fr));gap:20px;margin-top:20px;">
      <div class="lang-card" tabindex="0" onclick="goTo('index.html')">English</div>
      <div class="lang-card" tabindex="0" onclick="goTo('index.html')">Hindi</div>
      <div class="lang-card" tabindex="0" onclick="goTo('index.html')">Japanese</div>
    </div>
  </main>

  <script>
    function goTo(url) { window.location.href = url; }

    document.addEventListener('keydown', (e) => {
      const cards = document.querySelectorAll('.lang-card');
      let index = Array.from(cards).findIndex(c => c === document.activeElement);
      if (index === -1) index = 0;

      switch(e.key) {
        case 'ArrowRight': if (cards[index + 1]) cards[index + 1].focus(); break;
        case 'ArrowLeft': if (cards[index - 1]) cards[index - 1].focus(); break;
        case 'Enter': cards[index].click(); break;
      }
    });

    document.querySelector('.lang-card').focus();
  </script>

  <style>
    .lang-card {
      padding: 50px 20px;
      background: #2c3e50;
      color: white;
      text-align: center;
      border-radius: 10px;
      cursor: pointer;
      font-size: 1.1rem;
    }
    .lang-card:focus {
      outline: 4px solid #e50914;
      transform: scale(1.05);
    }
  </style>
</body>
</html>
