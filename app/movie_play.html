
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Play Movie</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="play-body" tabindex="0">
  <header class="app-header">
    <img src="assets/logo.png" alt="Logo" class="logo" />
    <a href="index.html" class="back-btn">← Back</a>
  </header>

  <div class="player-container">
    <h2 id="play-title">Loading...</h2>
    <p>Simulated Video Player - Press Enter to Play (TV Remote)</p>
    <button class="play-action-btn" onclick="alert('Playing...')">▶ Play Now</button>
  </div>

  <script>
    window.onload = function () {
      const urlParams = new URLSearchParams(window.location.search);
      const title = decodeURIComponent(urlParams.get("title") || "Unknown");
      document.getElementById("play-title").textContent = title;
    };
  </script>
</body>
</html>
