
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Category</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body tabindex="0">
  <header class="app-header">
    <img src="assets/logo.png" alt="Logo" class="logo" />
    <a href="index.html" class="back-btn">← Back</a>
  </header>

  <h2 class="page-title" id="category-title"></h2>
  <div class="movie-row" id="category-movies"></div>

  <script src="script.js"></script>
  <script>
    window.onload = function () {
      const urlParams = new URLSearchParams(window.location.search);
      const category = urlParams.get("category");

      document.getElementById("category-title").textContent = formatText(category);

      fetch("movies.json")
        .then(res => res.json())
        .then(data => {
          const filtered = data.filter(m => m.category === category);
          const container = document.getElementById("category-movies");
          filtered.forEach(movie => renderMovieCard(movie, container));
        });
    };
  </script>
</body>
</html>
