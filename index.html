
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>K-OTT</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="main-page">
  <header class="app-header">
    <div class="logo">
      <img src="images/logo.png" alt="Logo" />
    </div>
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Search movies..." />
    </div>
    <div class="menu-icon" onclick="toggleMenu()">☰</div>
  </header>

  <!-- Hero Slider (Only Trailers) -->
  <section class="hero-slider" id="hero-slider">
    <div class="slide" id="hero-slide"></div>
    <button class="hero-play-btn" id="hero-play-btn">▶ Play</button>
  </section>

  <!-- Language Preview -->
  <section class="movie-section">
    <div class="section-header">
      <h2 class="section-title">Languages</h2>
      <a href="movies_category.html?category=languages" class="see-all">See All</a>
    </div>
    <div class="movie-row" id="language-row"></div>
  </section>

  <!-- Dynamic Sections -->
  <div id="dynamic-sections"></div>

  <script src="script.js" type="module"></script>
</body>
</html>
