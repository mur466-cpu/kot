
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Category - Kancherla</title>
  <style>
    body { background: #111; color: white; font-family: sans-serif; padding: 20px; }
    h1 { text-align: center; }
    .movie-row {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      justify-content: center;
    }
    .movie-card {
      width: 160px;
      background: #222;
      color: yellow;
      border-radius: 8px;
      overflow: hidden;
    }
    .movie-card img {
      width: 100%;
      height: 100px;
      object-fit: cover;
    }
    .movie-info {
      padding: 0px;
    }


    .back-btn {
      display: block;
      margin: 20px auto;
      text-align: center;
      color: #00aaff;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <h1 id="category-title">Movies</h1>
  <div class="movie-row" id="category-movies"></div>
  <a href="index.html" class="back-btn">← Back to Home</a>

  <script>
    function formatText(text) {
      return text.split('_').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
    }

    const urlParams = new URLSearchParams(window.location.search);
    const category = urlParams.get("category");

    const titleEl = document.getElementById("category-title");
    const container = document.getElementById("category-movies");

    if (category === "languages") {
      titleEl.textContent = "All Languages";
      fetch('movies.json')
        .then(res => res.json())
        .then(movies => {
          const languages = [...new Set(movies.map(m => m.language))];
          languages.forEach(lang => {
            const card = document.createElement("div");
            card.className = "movie-card";
            card.innerHTML = `<div style="padding:20px;text-align:center;"><h3>${formatText(lang)}</h3></div>`;
            card.onclick = () => window.location.href = `language_page.html?language=${lang}`;
            container.appendChild(card);
          });
        });
    } else {
      titleEl.textContent = formatText(category);
      fetch('movies.json')
        .then(res => res.json())
        .then(movies => {
          const filtered = category === "new"
            ? movies.filter(m => m.year === Math.max(...movies.map(m => m.year)))
            : movies.filter(m => m.category === category);

          filtered.forEach(m => {
            const card = document.createElement("div");
            card.className = "movie-card";
            card.innerHTML = `
              <img src="${m.image}" alt="${m.title}">
              <div class="movie-info">
                <h3>${m.title}</h3>

              </div>
            `;
            card.onclick = () => window.location.href = `movie_play.html?title=${encodeURIComponent(m.title)}`;
            container.appendChild(card);
          });
        });
    }
  </script>
</body>
</html>
