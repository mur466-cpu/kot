
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Watch - Kancherla</title>
  <style>
    body { background: #000; color: white; font-family: sans-serif; padding: 20px; }
    .player-container {
      max-width: 800px;
      margin: 0 auto;
      text-align: center;
    }
    iframe {
      width: 100%;
      height: 500px;
      border: none;
      border-radius: 12px;
    }
    .details {
      margin-top: 20px;
      text-align: left;
    }
    .back-btn {
      display: block;
      margin: 20px auto;
      text-align: center;
      color: #00aaff;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="player-container">
    <iframe id="video-player" allowfullscreen></iframe>
    <div class="details">
      <h2 id="movie-title"></h2>
      <p id="movie-desc"></p>
    </div>
    <a href="index.html" class="back-btn">← Back to Home</a>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const title = urlParams.get("title");

    document.getElementById("movie-title").textContent = decodeURIComponent(title);

    fetch('movies.json')
      .then(res => res.json())
      .then(movies => {
        const movie = movies.find(m => m.title === decodeURIComponent(title));
        if (movie) {
          document.getElementById("video-player").src = movie.link;
          document.getElementById("movie-desc").textContent = movie.description;
        } else {
          document.getElementById("movie-desc").textContent = "Movie not found.";
        }
      });
  </script>
</body>
</html>
