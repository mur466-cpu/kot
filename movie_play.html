
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Now Playing</title>
  <style>
    body { background: #000; color: white; text-align: center; padding: 50px; }
    .video-placeholder {
      width: 80%;
      height: 500px;
      background: #222;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px dashed #e50914;
    }
    button { padding: 15px 30px; font-size: 1.2rem; margin-top: 20px; }
  </style>
</head>
<body>
  <img src="assets/logo.png" alt="Logo" style="height:60px;" />
  <div class="video-placeholder">
    <h2>🎥 Playing Movie...</h2>
  </div>
  <button onclick="window.history.back()">Back</button>

  <script>
    // Simulate TV remote back
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Backspace' || e.key === 'Escape') {
        window.history.back();
      }
    });
  </script>
</body>
</html>
